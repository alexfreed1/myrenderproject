<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trainer Login | TTTTI</title>
  <link rel="stylesheet" href="/static/css/base.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="logo"><img src="{{ LOGO_URL }}" alt="Logo"></div>
    <h1>Trainer Login</h1>
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    <form method="post">
      <div class="form-group"><label>Username</label><input type="text" name="username" class="form-control" required autofocus></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" class="form-control" required></div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:4px;">Login</button>
    </form>
    <div class="auth-footer"><a href="/">← Back to Home</a></div>
  </div>
</div>
</body>
</html>
