<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Login | TTTTI</title>
  <link rel="stylesheet" href="/static/css/base.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="logo"><img src="{{ LOGO_URL }}" alt="Logo"></div>
    <h1>Student Login</h1>
    {% if registered %}<div class="alert alert-success">Registration successful! Please login.</div>{% endif %}
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    <form method="post">
      <div class="form-group"><label>Admission Number</label><input type="text" name="admission_number" class="form-control" required autofocus></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" class="form-control" required></div>
      <button type="submit" class="btn btn-warning" style="width:100%;margin-top:4px;">Login</button>
    </form>
    <div class="auth-footer">
      <a href="/student/register">Register</a> &nbsp;|&nbsp;
      <a href="/forgot_password">Forgot Password?</a><br>
      <a href="/" style="margin-top:8px;display:inline-block;">← Back to Home</a>
    </div>
  </div>
</div>
</body>
</html>
