<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Student Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #1e5a9f 0%, #2e75b6 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    .login-box h2 { color: #1e5a9f; margin-bottom: 30px; text-align: center; }
    .error { color: #d32f2f; background-color: #ffebee; padding: 12px; border-radius: 4px; margin-bottom: 20px; text-align: center; }
    .success { color: #2e7d32; background-color: #e8f5e9; padding: 12px; border-radius: 4px; margin-bottom: 20px; text-align: center; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
    .form-group input:focus { outline: none; border-color: #1e5a9f; }
    .form-group button { width: 100%; padding: 12px; background-color: #ff9800; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
    .form-group button:hover { background-color: #f57c00; }
    .footer { text-align: center; margin-top: 20px; font-size: 14px; }
    .footer a { color: #1e5a9f; text-decoration: none; margin: 0 5px; }
  </style>
</head>
<body>
  <div class="login-box">
    <div style="text-align:center;margin-bottom:20px;"><img src="{{ LOGO_URL }}" alt="Logo" style="height:80px;"></div>
    <h2>Student Login</h2>
    {% if registered %}<div class="success">Registration successful! Please login.</div>{% endif %}
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      <div class="form-group"><label>Admission Number</label><input type="text" name="admission_number" required></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
      <div class="form-group"><button type="submit">Login</button></div>
    </form>
    <div class="footer">
      <p><a href="/student/register">Register</a> | <a href="/forgot_password">Forgot Password?</a></p>
      <p style="margin-top:10px;"><a href="/">Back to Home</a></p>
    </div>
  </div>
</body>
</html>
